<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthcare DApp</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
</head>
<body>
<div class="container">
  <h1>  Healthcare DApp</h1>

  <button id="connectWalletBtn">Connect Wallet</button>
  <p id="accountDisplay"></p>

  <div id="roleInfo"></div>

  <div id="adminActions" class="dashboard">
    <h2>Admin Functions</h2>
    <input id="patientAddr" placeholder="Patient Address">
    <input id="patientName" placeholder="Patient Name">
    <input id="patientHash" placeholder="Data Hash">
    <button id="registerPatientBtn">Register Patient</button>

    <input id="doctorAddr" placeholder="Doctor Address">
    <input id="doctorName" placeholder="Doctor Name">
    <input id="doctorSpec" placeholder="Specialization">
    <button id="registerDoctorBtn">Register Doctor</button>

    <input id="verifyDoctorAddr" placeholder="Doctor Address">
    <button id="verifyDoctorBtn">Verify Doctor</button>
  </div>

  <div id="doctorActions" class="dashboard">
    <h2>Doctor Functions</h2>
    <input id="requestPatientAddr" placeholder="Patient Address">
    <button id="requestAccessBtn">Request Access</button>

    <input id="viewPatientAddr" placeholder="Patient Address">
    <button id="viewPatientDataBtn">View Patient Data</button>
    <p id="patientDataDisplay"></p>
  </div>

  <div id="patientActions" class="dashboard">
    <h2>Patient Functions</h2>
    <div id="requestList"></div>

    <input id="approveRequestId" placeholder="Request ID">
    <input id="approveDuration" placeholder="Duration seconds">
    <button id="approveAccessBtn">Approve Access</button>

    <input id="revokeDoctorAddr" placeholder="Doctor Address">
    <button id="revokeAccessBtn">Revoke Access</button>

    <input id="updateHash" placeholder="New Data Hash">
    <button id="updateDataBtn">Update Medical Data</button>
  </div>

  <div id="status"></div>
</div>

<script src="app.js"></script>
</body>
</html>
